services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: mongodb
      MONGO_INITDB_ROOT_USERNAME: gs1dev
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - /home/mateigrigoras/proiecte/btpay/databases:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 3s
      retries: 20

  btmock:
    image: dhub.gs1.ro/ro.gs1.dev/btmock:latest
    container_name: btmock
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_BASE_URI: beta.gs1.ro
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://gs1dev:admin@mongodb:27017
<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
   xmlns:p="http://primefaces.org/ui" xmlns:f="http://xmlns.jcp.org/jsf/core"
   xmlns:ui="http://xmlns.jcp.org/jsf/facelets" template="/template/layout.xhtml">

   <!-- Page Title -->
   <ui:define name="title">
        Test Order Page
    </ui:define>

   <!-- Page Content -->
   <ui:define name="content">
      <div class="d-flex justify-content-center align-items-center" style="height: 60vh;">
         <h:form id="testOrderForm">
            <div class="mb-3 position-relative">
               <label for="Description" class="form-label"> Descriere comanda</label>
               <p:inputText id="Description" value="#{testPageBean.description}" styleClass="form-control pe-5"
                  placeholder="enter description" required="true" />
            </div>
            <p:commandButton value="Creează Comandă de Test" action="#{testPageBean.createTestOrder()}"
               styleClass="btn btn-success btn-lg" ajax="false">
               <f:ajax disabled="true"/>
                </p:commandButton>
         </h:form>
      </div>
   </ui:define>
</ui:composition>

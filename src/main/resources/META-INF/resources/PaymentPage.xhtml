<ui:composition template="/template/layout.xhtml" xmlns="http://www.w3.org/1999/xhtml"
   xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:p="http://primefaces.org/ui" xmlns:f="http://xmlns.jcp.org/jsf/core"
   xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

   <f:metadata>
      <f:viewAction action="#{paymentPageBean.actionViewInit}" onPostback="false" />
   </f:metadata>
   <ui:define name="title">Pagina de plată</ui:define>

   <ui:define name="lasthead">
      <script type="text/javascript">
       remainingSeconds = #{paymentPageBean.sessionTimeoutSeconds};
</script>
      <h:outputScript name="/js/paymentPage.js" target="body" />
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
      <meta http-equiv="refresh" content="#{paymentPageBean.sessionTimeoutSeconds};url=#{paymentPageBean.redirect}" />
   </ui:define>

   <ui:define name="content">

      <div class="container my-4">
         <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
               <div class="bg-white rounded-4 shadow p-4 payment-box">
                  <div class="row mb-3 align-items-center">
                     <div class="col-2">
                        <h:graphicImage name="svg/bt-banca-transilvania-seeklogo.svg" styleClass="img-fluid"
                           style="height: 40px;" alt="BT Logo" />
                     </div>
                     <div class="col-7"></div>
                     <div class="col-3 text-end session-expiry small">
                        Sesiunea expiră în:<br /> <span id="session-time" class="session-time fw-bold text-primary">--</span>
                     </div>
                  </div>

                  <div class="bg-light rounded-3 p-3 mb-4">
                     <div class="row mb-1">
                        <div class="col-5 text-secondary small">Nume comerciant</div>
                        <div class="col-7 fw-semibold">GS1 Data systems</div>
                     </div>
                     <div class="row mb-1">
                        <div class="col-5 text-secondary small">Suma de plată</div>
                        <h:outputText class="col-7 fw-semibold" value="#{paymentPageBean.amount}" />
                     </div>
                     <div class="row">
                        <div class="col-5 text-secondary small">Descriere comanda</div>
                        <h:outputText class="col-7 fw-semibold" value="#{paymentPageBean.description}" />
                     </div>
                  </div>

                  <h:form id="paymentForm" styleClass="mb-3">
                     <div class="mb-3 position-relative">
                        <label for="cardNumber" class="form-label">Numar card</label>
                        <p:inputText id="cardNumber" value="#{paymentPageBean.cardNumber}"
                           styleClass="form-control pe-5" placeholder="Ex: 4222 - XXXX - XXXX - XXXX" required="true" />
                        <span class="input-placeholder-icon"><i class="fas fa-credit-card" /></span>
                     </div>
                     <div class="row mb-3">
                        <div class="col-6">
                           <label for="expDate" class="form-label">Data expirare</label>
                           <p:inputText id="expDate" value="#{paymentPageBean.cardExpiration}" styleClass="form-control"
                              placeholder="MM/YY" required="true" />
                        </div>
                        <div class="col-6 position-relative">
                           <label for="cvv" class="form-label">Cod de securitate</label>
                           <p:inputText id="cvv" value="#{paymentPageBean.cardSecurity}" styleClass="form-control pe-5"
                              placeholder="123" required="true" />
                           <span class="input-placeholder-icon"><i class="fas fa-eye-slash" /></span>
                        </div>
                     </div>
                     <div class="mb-3">
                        <label for="cardName" class="form-label">Nume de pe card</label>
                        <p:inputText id="cardName" value="#{paymentPageBean.cardholderName}" styleClass="form-control"
                           placeholder="Ex: Ioana Popescu" required="true" />
                     </div>
                     <p:commandButton value="Plătește #{paymentPageBean.amount} RON"
                        action="#{paymentPageBean.actionPay}" styleClass="btn btn-primary btn-lg w-100" />
                     <p:outputLabel for="cardMenu" value="Alege un card existent:" styleClass="fw-bold me-2" />
                     <p:selectOneMenu id="cardMenu" value="#{paymentPageBean.selectedCard}"
                        converter="creditCardConverter">
                        <f:selectItem itemLabel="Selectează un card" itemValue="#{null}" noSelectionOption="true" />
                        <f:selectItems value="#{paymentPageBean.allCards}" var="card" itemValue="#{card}"
                           itemLabel="#{card.nameOnCard} - ****#{card.cardNumber.substring(card.cardNumber.length() - 4)}" />
                        <p:ajax update="paymentForm" process="@this" listener="#{paymentPageBean.onCardSelected}" />
                     </p:selectOneMenu>
                     <p:messages />
                  </h:form>

                  <div class="row align-items-center mt-3">
                     <div class="col-6 d-flex align-items-center text-success small">
                        <span class="input-placeholder-icon me-1"><i class="fa-solid fa-lock"></i></span> Plata
                        securizată
                     </div>
                     <div class="col-6 text-end payment-icons">
                        <span class="input-placeholder-icon"><i class="fab fa-cc-visa fa-lg text-primary me-2"></i></span>
                        <span class="input-placeholder-icon"><i
                           class="fab fa-cc-mastercard fa-lg text-danger me-2"></i></span>
                     </div>
                  </div>
               </div>
               <div class="mt-3 text-center">
                  <p:link outcome="/index.xhtml" value="Vezi comenzi" styleClass="btn btn-outline-secondary btn-sm" />
               </div>
            </div>

         </div>

      </div>


   </ui:define>

</ui:composition>
</html>

<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:p="http://primefaces.org/ui"
   xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<f:metadata>
   <f:viewAction action="#{paymentPageBean.actionViewInit}" onPostback="false" />
</f:metadata>
<h:head>
   <title>Pagina de plată</title>
   <!-- Bootstrap 5 CDN -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
   <meta http-equiv="refresh" content="#{paymentPageBean.sessionTimeoutSecs};url=#{paymentPageBean.redirect}" />
</h:head>
<h:body>
   <div class="container my-4">
      <div class="row justify-content-center">
         <div class="col-md-6 col-lg-5">
            <div class="bg-white rounded-4 shadow p-4 payment-box">
               <!-- Header -->
               <div class="row mb-3 align-items-center">
                  <div class="col-2">
                     <h:graphicImage name="svg/bt-banca-transilvania-seeklogo.svg" styleClass="img-fluid"
                        style="height: 40px;" alt="BT Logo" />
                  </div>
                  <div class="col-7"></div>
                  <div class="col-3 text-end session-expiry small">
                     Sesiunea expiră în:<br /> <span id="session-time" class="session-time fw-bold text-primary">--</span>
                  </div>
               </div>

               <!-- Merchant Info -->
               <div class="bg-light rounded-3 p-3 mb-4">
                  <div class="row mb-1">
                     <div class="col-5 text-secondary small">Nume comerciant</div>
                     <div class="col-7 fw-semibold">GS1 Data systems</div>
                  </div>
                  <div class="row mb-1">
                     <div class="col-5 text-secondary small">Suma de plată</div>
                     <h:outputText class="col-7 fw-semibold" value="#{paymentPageBean.amount}" />
                  </div>
                  <div class="row">
                     <div class="col-5 text-secondary small">Descriere comanda</div>
                     <h:outputText class="col-7 fw-semibold" value="#{paymentPageBean.description}" />
                  </div>
               </div>

               <!-- Payment Form -->
               <h:form id="paymentForm" styleClass="mb-3">
                  <div class="mb-3 position-relative">
                     <label for="cardNumber" class="form-label">Numar card</label>
                     <p:inputText id="cardNumber" value="placeholder" styleClass="form-control pe-5"
                        placeholder="Ex: 4222 - XXXX - XXXX - XXXX" />
                     <span class="input-placeholder-icon"><i class="fas fa-credit-card" /></span>
                  </div>
                  <div class="row mb-3">
                     <div class="col-6">
                        <label for="expDate" class="form-label">Data expirare</label>
                        <p:inputText id="expDate" value="placeholder" styleClass="form-control" placeholder="MM/YY" />
                     </div>
                     <div class="col-6 position-relative">
                        <label for="cvv" class="form-label">Cod de securitate</label>
                        <p:inputText id="cvv" value="placeholder" styleClass="form-control pe-5" placeholder="123" />
                        <span class="input-placeholder-icon"><i class="fas fa-eye-slash" /></span>
                     </div>
                  </div>
                  <div class="mb-3">
                     <label for="cardName" class="form-label">Nume de pe card</label>
                     <p:inputText id="cardName" value="placeholder" styleClass="form-control"
                        placeholder="Ex: Ioana Popescu" />
                  </div>
                  <p:commandButton value="Plătește #{paymentPageBean.amount} RON" action="paymentPageBean.actionSubmit"
                     styleClass="btn btn-primary btn-lg w-100" />
               </h:form>

               <!-- Footer -->
               <div class="row align-items-center mt-3">
                  <div class="col-6 d-flex align-items-center text-success small">
                     <span class="input-placeholder-icon me-1"><i class="fa-solid fa-lock"></i></span> Plata securizată
                  </div>
                  <div class="col-6 text-end payment-icons">
                     <span class="input-placeholder-icon"><i class="fab fa-cc-visa fa-lg text-primary me-2"></i></span>
                     <span class="input-placeholder-icon"><i class="fab fa-cc-mastercard fa-lg text-danger me-2"></i></span>
                  </div>
               </div>
            </div>
         </div>
      </div>
   </div>
   <script type="text/javascript">
    let remainingSeconds = #{paymentPageBean.sessionTimeoutSecs};

    function updateCountdown() {
        const display = document.getElementById("session-time");
        if (!display) return;

        const minutes = Math.floor(remainingSeconds / 60);
        const seconds = remainingSeconds % 60;
        display.textContent = minutes + " min. " + (seconds &lt; 10 ? "0" : "") + seconds + " sec.";

        if (remainingSeconds > 0) {
            remainingSeconds--;
        } else {
            clearInterval(timerInterval);
            display.textContent = "Sesiunea a expirat";
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        updateCountdown();
        timerInterval = setInterval(updateCountdown, 1000);
    });
</script>
</h:body>
</html>

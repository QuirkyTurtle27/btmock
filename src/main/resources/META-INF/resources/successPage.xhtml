<ui:composition template="/template/layout.xhtml" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
   xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
   xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

   <f:metadata>
      <f:viewAction action="#{paymentResultBean.actionViewInit}" onPostback="false" />
   </f:metadata>

   <ui:define name="title">Plata reușită</ui:define>

   <ui:define name="lasthead">
      <!-- Redirect back to merchant after 5s (adjust if you want) -->
      <meta http-equiv="refresh" content="5;url=#{paymentResultBean.merchantReturnUrl}" />
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
   </ui:define>

   <ui:define name="content">
      <h:form styleClass="d-flex justify-content-center mt-5">
         <p:panel styleClass="col-md-6 p-4 shadow-sm rounded" style="background-color: white;">
            <!-- Success header -->
            <div class="text-center mb-3">
               <i class="fas fa-circle-check text-success fa-3x mb-2"></i>
               <p:outputLabel value="Plata a fost acceptată" styleClass="fw-bold text-success fs-5 d-block" />
               <p:outputLabel value="Tranzacția a fost procesată cu succes." styleClass="text-success fw-semibold" />
            </div>

            <!-- Return button -->
            <div class="text-center my-3">
               <p:commandButton value="← Înapoi la comerciant"
                                action="#{paymentResultBean.redirectToMerchant}"
                                ajax="false"
                                styleClass="btn btn-primary" />
            </div>

            <!-- Transaction details -->
            <p:panel header="Detalii tranzacție" styleClass="mt-4" toggleable="false">
               <p:outputLabel value="Nume comerciant: Gs1 Data Systems" styleClass="d-block mb-2" />
               <p:outputLabel value="Data: #{paymentResultBean.date}" styleClass="d-block mb-2">
                  <f:convertDateTime pattern="dd.MM.yyyy" />
               </p:outputLabel>
               <p:outputLabel value="Ora: #{paymentResultBean.date}" styleClass="d-block mb-2">
                  <f:convertDateTime pattern="HH:mm" />
               </p:outputLabel>
               <p:outputLabel value="Suma plătită: #{paymentResultBean.amount} RON" styleClass="d-block mb-2" />
            </p:panel>

            <!-- Card info -->
            <p:panel header="Informații card" styleClass="mt-4" toggleable="false">
               <p:outputLabel value="Număr card: #{paymentResultBean.cardMaskedPan}" styleClass="d-block mb-2" />
               <p:outputLabel value="Data expirare: #{paymentResultBean.cardExpiration}" styleClass="d-block mb-2" />
               <p:outputLabel value="Nume de pe card: #{paymentResultBean.cardholderName}" styleClass="d-block mb-2" />
            </p:panel>

            <!-- Order description -->
            <p:panel header="Descriere comandă" styleClass="mt-4" toggleable="false">
               <p:outputLabel value="#{paymentResultBean.description}" />
            </p:panel>
         </p:panel>
      </h:form>
   </ui:define>
</ui:composition>

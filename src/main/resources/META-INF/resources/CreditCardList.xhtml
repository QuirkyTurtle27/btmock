<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
<ui:composition template="/template/layout.xhtml">
    <ui:define name="title">Credit Cards</ui:define>

    <ui:define name="content">
        <h:form id="cardForm">
            <h2>Stored Credit Cards</h2>
            <p:dataTable id="creditCardTable"
                         value="#{indexPageBean.creditCards}"
                         var="card"
                         stripedRows="true"
                         responsiveLayout="scroll">

                <p:column headerText="Card Number">
                    <h:outputText value="#{card.cardNumber}" />
                </p:column>
                <p:column headerText="Expiry Date">
                    <h:outputText value="#{card.expiryDate}" />
                </p:column>
                <p:column headerText="Security Code">
                    <h:outputText value="#{card.securityCode}" />
                </p:column>
                <p:column headerText="Name on Card">
                    <h:outputText value="#{card.nameOnCard}" />
                </p:column>

            </p:dataTable>
        </h:form>
    </ui:define>
</ui:composition>
</html>
